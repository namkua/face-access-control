[flake8]
max-line-length = 120
exclude = .git,__pycache__,venv,env,build,dist,.eggs
ignore = E203,E266,E501,W503,F403,F401

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True

[coverage:run]
source = api
omit =
    */tests/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[tool:pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
markers =
    slow: marks tests as slow
    integration: integration tests
    unit: unit tests
